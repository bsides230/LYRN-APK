<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LYRN Delta Manager (Module)</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

  <style>
    /* [ ... CORE VARIABLES ... ] */
    :root {
      --bg-core: #050505;
      --bg-panel: #0a0a0a;
      --bg-input: #050505;
      --brand-purple: #7c5cff;
      --brand-purple-dim: rgba(124, 92, 255, 0.1);
      --text-head: #ffffff;
      --text-body: #b0b0b0;
      --text-dim: #666666;
      --border-color: #222222;
      --input-focus-bg: #111111;
      --success-color: #10B981;
      --error-color: #EF4444;

      --btn-text: #e0e0e0;
      --btn-border: #444444;
      --btn-bg: rgba(255,255,255,0.03);

      /* TYPOGRAPHY */
      --font-size-base: 12px;
    }

    body[data-theme="light"] {
        --bg-core: #eef0f4;
        --bg-panel: #ffffff;
        --bg-input: #ffffff;
        --brand-purple: #6a4ce0;
        --brand-purple-dim: rgba(106, 76, 224, 0.1);
        --text-head: #111111;
        --text-body: #333333;
        --text-dim: #555555;
        --border-color: #d1d5db;
        --input-focus-bg: #f9fafb;
        --btn-text: #333;
        --btn-border: #ccc;
        --btn-bg: rgba(0,0,0,0.03);
    }

    * { box-sizing: border-box; }

    /* --- THEMED SCROLLBARS --- */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; border: 2px solid transparent; background-clip: content-box; }
    ::-webkit-scrollbar-thumb:hover { background-color: var(--brand-purple); }

    body {
      margin: 0; padding: 0;
      background-color: var(--bg-core); color: var(--text-body);
      font-family: 'Inter', system-ui, sans-serif;
      height: 100vh; width: 100vw; overflow: hidden;
      font-size: var(--font-size-base);
    }

    h1, h2, h3 { font-family: 'JetBrains Mono', monospace; color: var(--text-head); margin: 0; }

    /* UI ELEMENTS */
    button {
      font-family: 'JetBrains Mono', monospace;
      font-size: calc(var(--font-size-base) - 1px);
      background: var(--btn-bg);
      border: 1px solid var(--btn-border); color: var(--btn-text); padding: 8px 12px;
      cursor: pointer; text-transform: uppercase; letter-spacing: 0.1em; transition: all 0.2s ease; border-radius: 4px;
      white-space: nowrap;
    }
    button:hover { border-color: var(--brand-purple); color: var(--brand-purple); }
    button.btn-primary { background: var(--brand-purple); color: #ffffff; border-color: var(--brand-purple); font-weight: 600; }
    button.btn-primary:hover { background: #6a4ce0; }
    .btn-group { display: flex; align-items: center; gap: 8px; }
    .btn-square { width: 32px; height: 32px; padding: 0; display: flex; align-items: center; justify-content: center; font-size: calc(var(--font-size-base) + 4px); }
    .btn-delete:hover { border-color: var(--error-color); color: var(--error-color); }

    .hidden { display: none !important; }

    /* LAYOUT */
    .module-wrapper {
      background: var(--bg-core);
      height: 100vh; width: 100%;
      display: flex; flex-direction: column; position: relative;
    }

    header {
      border-bottom: 1px solid var(--border-color); padding: 12px 16px;
      display: flex; justify-content: space-between; align-items: center;
      background: var(--bg-panel); flex-shrink: 0;
    }

    .meta-label {
        font-family: 'JetBrains Mono';
        font-size: calc(var(--font-size-base) - 2px);
        color: var(--brand-purple); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px; display: block;
    }
    .panel-title { font-size: calc(var(--font-size-base) + 2px); font-weight: 600; }

    /* MAIN CONTENT */
    .main-content {
      flex: 1; overflow-y: auto; padding: 20px;
    }

    /* DELTA CARD LIST */
    .delta-list {
        display: flex; flex-direction: column; gap: 10px;
    }

    .section-title {
        font-family: 'JetBrains Mono', monospace;
        font-size: calc(var(--font-size-base) + 2px);
        color: var(--text-head);
        margin-top: 20px;
        margin-bottom: 10px;
        padding-bottom: 5px;
        border-bottom: 1px solid var(--border-color);
    }

    .delta-card {
        background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 6px;
        padding: 15px; display: flex; justify-content: space-between; align-items: center;
        transition: border-color 0.2s;
    }
    .delta-card:hover { border-color: var(--brand-purple-dim); }

    .delta-info { display: flex; flex-direction: column; gap: 5px; flex: 1; overflow: hidden; }
    .delta-name { font-family: 'JetBrains Mono', monospace; font-size: calc(var(--font-size-base) + 1px); color: var(--text-head); font-weight: bold; }
    .delta-value { font-family: 'JetBrains Mono', monospace; font-size: var(--font-size-base); color: var(--brand-purple); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; background: var(--bg-input); padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border-color); display: inline-block; max-width: fit-content;}

    .delta-actions { display: flex; align-items: center; gap: 15px; }

    .interval-input {
        background: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-head);
        font-family: 'JetBrains Mono', monospace; font-size: var(--font-size-base); border-radius: 4px;
        padding: 4px 8px; width: 60px; text-align: right;
    }
    .interval-input:focus { border-color: var(--brand-purple); outline: none; }

    .interval-label { font-size: calc(var(--font-size-base) - 2px); color: var(--text-dim); text-transform: uppercase; margin-right: 5px;}

    /* SWITCH */
    .switch { position: relative; display: inline-block; width: 34px; height: 20px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--bg-input); transition: .4s; border-radius: 20px; border: 1px solid var(--border-color); }
    .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: var(--text-dim); transition: .4s; border-radius: 50%; }
    input:checked + .slider { background-color: var(--brand-purple); border-color: var(--brand-purple); }
    input:checked + .slider:before { transform: translateX(14px); background-color: #fff; }

    /* TOAST */
    #toast {
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        background: var(--bg-panel); border: 1px solid var(--brand-purple);
        color: var(--text-head); padding: 10px 20px; border-radius: 4px;
        font-family: 'JetBrains Mono', monospace; font-size: var(--font-size-base);
        opacity: 0; pointer-events: none; transition: opacity 0.3s;
        box-shadow: 0 10px 30px rgba(0,0,0,0.8); z-index: 11000;
    }
    #toast.show { opacity: 1; }

    .empty-state { text-align: center; color: var(--text-dim); padding: 40px; font-style: italic; }

    /* MODAL */
    .modal-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(2px);
        z-index: 10000; display: flex; justify-content: center; align-items: center;
    }
    .modal-box {
        background: var(--bg-panel); border: 1px solid var(--border-color);
        box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 400px;
        display: flex; flex-direction: column; border-radius: 8px; animation: slideUp 0.3s ease-out;
    }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-header { padding: 15px 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
    .modal-body { padding: 20px; }
    .modal-footer { padding: 15px 20px; border-top: 1px solid var(--border-color); display: flex; justify-content: flex-end; gap: 10px; }

    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-size: calc(var(--font-size-base) - 2px); color: var(--text-dim); text-transform: uppercase; margin-bottom: 5px; font-family: 'JetBrains Mono'; }
    input[type="text"] { width: 100%; background: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-head); padding: 10px; font-family: 'JetBrains Mono', monospace; font-size: var(--font-size-base); border-radius: 4px; }
    input[type="text"]:focus { border-color: var(--brand-purple); outline: none; background: var(--input-focus-bg); }

  </style>
</head>
<body>

  <div class="module-wrapper">
    <header>
        <div>
            <div class="meta-label">LYRN SYSTEM MODULE</div>
            <h1 class="panel-title">Delta Manager</h1>
        </div>
        <div class="btn-group">
            <button class="btn-square" onclick="openHelp()" title="Help">?</button>
            <button class="btn-primary" onclick="openAddModal()">Add Delta</button>
            <button class="btn-square" onclick="fetchDeltas()" title="Refresh">🔄</button>
        </div>
    </header>

    <div class="main-content">
        <h2 class="section-title">Active Data Streams</h2>
        <div id="delta-list-container" class="delta-list">
            <!-- Deltas populated here -->
            <div class="empty-state">Loading streams...</div>
        </div>

        <h2 class="section-title" style="margin-top: 40px;">Scheduled Scripts</h2>
        <div id="script-list-container" class="delta-list">
            <!-- Scripts populated here -->
            <div class="empty-state">Loading scripts...</div>
        </div>
    </div>
  </div>

  <div id="toast">Operation Successful</div>

  <!-- Add Modal -->
  <div id="add-modal" class="modal-overlay hidden">
    <div class="modal-box">
        <div class="modal-header">
            <h3 class="panel-title">Add New Delta Stream</h3>
            <button onclick="closeModal()" style="border:none; background:transparent; font-size:16px; color:var(--text-dim); cursor:pointer;">✕</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label>Delta Name</label>
                <input type="text" id="new-delta-name" placeholder="e.g. System Time">
            </div>
            <div class="form-group">
                <label>Initial Value (Optional)</label>
                <input type="text" id="new-delta-value" placeholder="e.g. waiting for data...">
            </div>
        </div>
        <div class="modal-footer">
             <button onclick="closeModal()">Cancel</button>
             <button class="btn-primary" onclick="submitNewDelta()">Create</button>
        </div>
    </div>
  </div>

  <script>
    let CORE_URL = "http://localhost:8000";
    let authToken = localStorage.getItem('lyrn_admin_token') || null;

    document.addEventListener('DOMContentLoaded', () => {
        const stored = localStorage.getItem('lyrn_core_url');
        if(stored) CORE_URL = stored.replace(/\/$/, "");

        if(authToken) initModule();

        window.addEventListener('message', (event) => {
            if (event.data.type === 'THEME_CHANGE') {
                document.body.setAttribute('data-theme', event.data.theme);
            }
            if (event.data.type === 'FONT_CHANGE') {
                document.documentElement.style.setProperty('--font-size-base', event.data.fontSize + 'px');
            }
            if (event.data.type === 'TOKEN_UPDATE') {
                const wasNull = !authToken;
                authToken = event.data.token;
                if(wasNull) initModule();
            }
            if (event.data.type === 'CORE_URL_CHANGE') {
                CORE_URL = event.data.url.replace(/\/$/, "");
                if(authToken) initModule();
            }
        });
    });

    function initModule() {
        fetchDeltas();
        fetchScripts();
        // No continuous polling — delta scripts run at model input time only.
        // Use the 🔄 button to manually refresh.
    }

    async function fetchDeltas() {
        if (!authToken) return;
        try {
            const res = await fetch(`${CORE_URL}/api/deltas`, {
                headers: { 'X-Token': authToken }
            });
            if (res.ok) {
                const deltas = await res.json();
                renderDeltas(deltas);
            }
        } catch(e) {
            console.warn("Failed to fetch deltas", e);
        }
    }

    function renderDeltas(deltas) {
        const container = document.getElementById('delta-list-container');
        if (!deltas || deltas.length === 0) {
            container.innerHTML = '<div class="empty-state">No active deltas. Endpoint /api/deltas/update is listening.</div>';
            return;
        }

        container.innerHTML = '';
        deltas.forEach(d => {
            const card = document.createElement('div');
            card.className = 'delta-card';

            // Encode HTML to prevent injection
            const safeName = escapeHtml(d.name);
            const safeValue = escapeHtml(d.value || 'No data');
            const isEnabled = d.enabled !== false; // Default to true if undefined

            card.innerHTML = `
                <div class="delta-info">
                    <span class="delta-name">${safeName}</span>
                    <span class="delta-value">${safeValue}</span>
                </div>
                <div class="delta-actions">
                    <label class="switch" title="Toggle Delta">
                        <input type="checkbox" onchange="toggleDelta('${safeName}', this.checked)" ${isEnabled ? 'checked' : ''}>
                        <span class="slider"></span>
                    </label>
                    <button class="btn-square btn-delete" onclick="deleteDelta('${safeName}')" title="Delete Delta">🗑️</button>
                </div>
            `;
            container.appendChild(card);
        });
    }

    async function toggleDelta(name, enabled) {
        try {
            const res = await fetch(`${CORE_URL}/api/deltas/${encodeURIComponent(name)}/toggle`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Token': authToken },
                body: JSON.stringify({ enabled })
            });
            if(res.ok) {
                showToast(`Delta ${enabled ? 'enabled' : 'disabled'}`);
                fetchDeltas();
            } else {
                showToast("Failed to toggle delta", true);
                fetchDeltas(); // Revert UI
            }
        } catch(e) {
            showToast("Connection Error", true);
            fetchDeltas();
        }
    }

    async function deleteDelta(name) {
        if(!confirm(`Are you sure you want to delete the delta '${name}'?`)) return;

        try {
            const res = await fetch(`${CORE_URL}/api/deltas/${encodeURIComponent(name)}`, {
                method: 'DELETE',
                headers: { 'X-Token': authToken }
            });
            if(res.ok) {
                showToast("Delta deleted");
                fetchDeltas();
            } else {
                showToast("Failed to delete delta", true);
            }
        } catch(e) {
            showToast("Connection Error", true);
        }
    }

    async function fetchScripts() {
        if (!authToken) return;
        try {
            const res = await fetch(`${CORE_URL}/api/deltas/scripts`, {
                headers: { 'X-Token': authToken }
            });
            if (res.ok) {
                const scripts = await res.json();
                renderScripts(scripts);
            }
        } catch(e) {
            console.warn("Failed to fetch scripts", e);
        }
    }

    function renderScripts(scripts) {
        const container = document.getElementById('script-list-container');
        if (!scripts || scripts.length === 0) {
            container.innerHTML = '<div class="empty-state">No delta scripts found in deltas/ directory.</div>';
            return;
        }

        // We only want to fully replace the DOM if we don't have existing elements
        // OR if the number of scripts changed, to avoid losing focus when a user is typing
        const existingCards = container.querySelectorAll('.delta-card[data-script-name]');
        const shouldFullRebuild = existingCards.length !== scripts.length;

        if (shouldFullRebuild) {
            container.innerHTML = '';
        }

        scripts.forEach(s => {
            const safeName = escapeHtml(s.name);
            const isEnabled = s.enabled === true;

            // Format last run
            let lastRunText = "Never";
            if (s.last_run > 0) {
                 const d = new Date(s.last_run * 1000);
                 lastRunText = d.toLocaleTimeString();
            }

            const intervalVal = Math.round(s.interval || 60);
            const safeId = safeName.replace(/[^a-zA-Z0-9_-]/g, '_');

            if (shouldFullRebuild) {
                const card = document.createElement('div');
                card.className = 'delta-card';
                card.setAttribute('data-script-name', safeName);

                card.innerHTML = `
                    <div class="delta-info">
                        <span class="delta-name">${safeName}</span>
                        <span class="delta-value" id="last-run-${safeId}" style="background:transparent; border:none; padding:0; color:var(--text-dim); font-size:calc(var(--font-size-base) - 1px);">Last Run: ${lastRunText}</span>
                    </div>
                    <div class="delta-actions">
                        <div style="display:flex; align-items:center;">
                            <span class="interval-label">Poll every</span>
                            <input type="number" min="1" class="interval-input" id="interval-${safeId}" value="${intervalVal}" onchange="updateScriptConfig('${safeName}', '${safeId}')">
                            <span class="interval-label" style="margin-left:5px;">sec</span>
                        </div>
                        <label class="switch" title="Enable Polling">
                            <input type="checkbox" id="toggle-${safeId}" onchange="updateScriptConfig('${safeName}', '${safeId}')" ${isEnabled ? 'checked' : ''}>
                            <span class="slider"></span>
                        </label>
                    </div>
                `;
                container.appendChild(card);
            } else {
                // Just update the dynamic values to not interrupt input focus
                const lastRunEl = document.getElementById(`last-run-${safeId}`);
                if (lastRunEl) {
                    lastRunEl.innerText = `Last Run: ${lastRunText}`;
                }

                const toggleEl = document.getElementById(`toggle-${safeId}`);
                if (toggleEl && toggleEl !== document.activeElement) {
                    toggleEl.checked = isEnabled;
                }

                // Do not update the interval input value if it has focus to prevent typing interruption
                const intervalEl = document.getElementById(`interval-${safeId}`);
                if (intervalEl && intervalEl !== document.activeElement) {
                    intervalEl.value = intervalVal;
                }
            }
        });
    }

    async function updateScriptConfig(name, id) {
        const intervalEl = document.getElementById(`interval-${id}`);
        const toggleEl = document.getElementById(`toggle-${id}`);

        if (!intervalEl || !toggleEl) return;

        const interval = parseInt(intervalEl.value, 10) || 60;
        const enabled = toggleEl.checked;

        try {
            const res = await fetch(`${CORE_URL}/api/deltas/scripts/${encodeURIComponent(name)}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Token': authToken },
                body: JSON.stringify({ interval, enabled })
            });
            if(res.ok) {
                showToast(`Updated script ${name}`);
            } else {
                showToast("Failed to update script config", true);
                fetchScripts(); // Revert
            }
        } catch(e) {
            showToast("Connection Error", true);
            fetchScripts();
        }
    }

    function openHelp() {
        window.parent.postMessage({
            type: 'OPEN_WIDGET',
            id: 'widget_delta_help',
            name: 'Delta Manager Instructions',
            file: 'instructions/DeltaManagerHelp.html'
        }, '*');
    }

    // Modal logic
    function openAddModal() {
        document.getElementById('new-delta-name').value = '';
        document.getElementById('new-delta-value').value = '';
        document.getElementById('add-modal').classList.remove('hidden');
    }

    function closeModal() {
        document.getElementById('add-modal').classList.add('hidden');
    }

    async function submitNewDelta() {
        const name = document.getElementById('new-delta-name').value.trim();
        const value = document.getElementById('new-delta-value').value.trim();

        if (!name) {
            showToast("Name is required", true);
            return;
        }

        try {
            const res = await fetch(`${CORE_URL}/api/deltas/update`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Token': authToken },
                body: JSON.stringify({ name, value: value || "Initialized" })
            });
            if(res.ok) {
                showToast("Delta created");
                closeModal();
                fetchDeltas();
            } else {
                showToast("Failed to create delta", true);
            }
        } catch(e) {
            showToast("Connection Error", true);
        }
    }

    function showToast(msg, error=false) {
        const t = document.getElementById('toast');
        if(!t) return;
        t.innerText = msg;
        t.style.borderColor = error ? 'var(--error-color)' : 'var(--brand-purple)';
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    function escapeHtml(text) {
        if (!text) return "";
        return String(text).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }
  </script>
</body>
</html>
